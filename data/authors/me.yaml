  - role: CFD/CAE Engineering Intern
    org: MiSmart — Remote-Control UAVs/Drones Startup
    start: 2023-05-01
    end: 2023-11-30
    summary: |
      Conducted aerodynamic analysis of 20+ airfoils and 10+ aircraft fuselages in ANSYS
      Fluent and Python. Designed and tested quadcopter UAVs in SolidWorks — achieved 15%
      production cost reduction and 10% flight-time durability improvement through
      iterative ground testing. Collaborated with Electrical, AI/ML, Design, and Testing
      teams to inform LiDAR object-scanning system design.

  - role: Manufacturing & Testing Engineer
    org: AeroCats — RC Aircraft Design & Manufacturing Club, UC
    start: 2022-08-22
    end: 2023-04-30
    summary: |
      Built 4 RC aircraft/UAVs with 16-ft wingspans for national intercollegiate
      competitions using laser-cut hardwood, pine, and balsa. Performance-tested 6 turbine
      models via 3 testing methods and identified the optimal design for maximum payload at
      SAE Aero Design West (4th overall, Regular Class, May 2023).


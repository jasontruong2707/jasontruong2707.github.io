  - role: Undergraduate Research Assistant
    org: University of Cincinnati — Multiphase Flow and Combustion Laboratory
    start: 2024-01-15
    summary: |
      Advisors: Prof. Prashant Khare, Dr. Kamin Manu. Five active projects spanning
      machine-learning-augmented compressible turbulence, gel propellant atomization, LES
      of swirling coaxial jets, shock-droplet fragmentation with embedded cavities, and
      spray combustion in bluff-body-stabilized combustors. Tools: MFC (Fortran),

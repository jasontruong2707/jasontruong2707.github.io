bio: |
  I am an undergraduate aerospace engineering researcher at the University of Cincinnati, 
  working with Prof. Prashant Khare and Dr. Kamin Manu in the Multiphase Flow and Combustion Laboratory.
  My work sits at the intersection of high-speed compressible flows, multiphase dynamics, reacting flows, 
  and machine-learning-accelerated CFD - spanning shock-driven droplet fragmentation, gel propellant atomization, 
  LES post-processing of recirculation structures in swirling jets, and spray combustion in bluff-body stabilized 
  combustors. I am preparing to pursue a PhD to continue developing computational methods for turbulent reacting 
  and multiphase flows.

